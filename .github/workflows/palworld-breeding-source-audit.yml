name: Palworld breeding source audit

on:
  push:
    branches: [main]
    paths:
      - "palworld/tools/audit_breeding_sources.py"
      - ".github/workflows/palworld-breeding-source-audit.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build audit report
        run: python palworld/tools/audit_breeding_sources.py
      - name: Commit report
        run: |
          if git diff --quiet -- palworld/audit/source-audit.json; then
            echo "Audit report unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add palworld/audit/source-audit.json
          git commit -m "Update Palworld breeding source audit [skip ci]"
          git push
